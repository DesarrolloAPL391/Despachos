<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reiniciar app</title>
  <style>
    body { font-family: system-ui, sans-serif; display: grid; place-items: center; height: 100vh; margin: 0; background: #1e88e5; color: #fff; }
    .card { background: #fff; color: #1f2933; padding: 28px 32px; border-radius: 14px; text-align: center; max-width: 360px; box-shadow: 0 10px 30px rgba(0,0,0,.25); }
    h2 { margin: 0 0 8px; }
    .spin { width: 34px; height: 34px; border: 4px solid #e3e8ef; border-top-color: #1e88e5; border-radius: 50%; margin: 14px auto; animation: r 1s linear infinite; }
    @keyframes r { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card">
    <div class="spin"></div>
    <h2>Limpiando caché…</h2>
    <p id="msg">Un momento, eliminando la versión vieja.</p>
  </div>
  <script>
    (async () => {
      try {
        if ('serviceWorker' in navigator) {
          const regs = await navigator.serviceWorker.getRegistrations();
          for (const r of regs) await r.unregister();
        }
        if (window.caches) {
          const keys = await caches.keys();
          for (const k of keys) await caches.delete(k);
        }
        document.getElementById('msg').textContent = '¡Listo! Abriendo la app actualizada…';
        setTimeout(() => location.replace('index.html'), 900);
      } catch (e) {
        document.getElementById('msg').textContent = 'Error: ' + e + '. Cierra y vuelve a entrar a index.html';
      }
    })();
  </script>
</body>
</html>
